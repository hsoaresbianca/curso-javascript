<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex 10</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
    <p>Velocidade do carro: <input type="number" name="txtvel" id="txtvel"> KM/h</p>
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res"></div>

    <script>

        function calcular() {
            var txtv = window.document.getElementById('txtvel')
            var res = window.document.getElementById('res')
            var vel = Number(txtv.value)
            res.innerHTML = `<p>Sua velocidade atual é de <strong>${vel}</strong> Km/h.</p>`
            if (vel > 60) {
                res.innerHTML += `<p>Você foi MULTADO por excesso de velocidade!</p>`
            } else {
                res.innerHTML += `<p>Você está dirigindo dentro do limite de velocidade. PARABÉNS!</p>`
            }

            res.innerHTML += `<p>Dirija sempre com cinto de segurança.</p>`

        }
    </script>
</body>
</html>
