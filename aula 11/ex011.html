<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex 11</title>
</head>
<body>
    <h1>Nacionalidade</h1>
    <p>Em qual país você nasceu?</p>
    <input type="text" name="txtnac" id="txtnac">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res"></div>

    <script>
        function verificar() {
            var txtn = window.document.getElementById('txtnac')
            var res =  window.document.getElementById('res')
            var nac = txtn.value
            res.innerHTML = `<p>Você nasceu em <strong>${nac}</strong>.</p>`
            if (nac == 'Brasil' || nac == 'brasil') {
                res.innerHTML += `Você é <strong>BRASILEIRO</strong>.`
            } else {
                res.innerHTML += `Você é <strong>GRINGO</strong>.`
            }

        }
    </script>

</body>
</html>
