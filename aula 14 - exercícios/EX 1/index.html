    <link rel="stylesheet" href="style.css">

        <div id="resultado">Preparando a contagem...</div>

        <p>Desenvolvido por <a href="https://www.linkedin.com/in/hsoaresbianca/" target="_blank">Bianca Soares</a>.</p>
