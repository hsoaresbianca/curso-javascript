<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        body {
            background-color: rgb(27, 115, 145);
            color: white;
            font: normal 18pt arial;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos com DOM</h1>
    <p>Aqui vai o resultado.</p>
    <p id="ip">Aprendendo a usar <strong>DOM</strong> em JavaScript.</p>
    <div class="cdiv">Clique em mim</div>

    <script>
        var p1 = window.document.getElementsByTagName('p')[0]
                
        p1.style.color = 'orange'

        var p2 = window.document.getElementById('ip')

        p2.style.color = 'yellow'

        var d1 = window.document.querySelector('div.cdiv')
        //pode ser .class ou #id
        d1.style.background = 'green'

    </script>
</body>
</html>
